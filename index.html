<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>逆勇者 〜魔王を倒してからが本番〜</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'MS Gothic', monospace;
    background: #000; color: #f4f4f8; font-size: 16px;
    overscroll-behavior: none; user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  #app { position: relative; height: 100dvh; max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; background: #05060d; }
  .win { background: #0a0b1c; border: 3px solid #f4f4f8; border-radius: 6px; box-shadow: 0 0 0 2px #000, inset 0 0 0 1px #000; }
  #hud { display: none; margin: 8px; padding: 7px 11px; font-size: 14px; line-height: 1.6; }
  #hud .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  #hud .zanto { color: #ff8a8a; font-weight: bold; }
  .bar { height: 9px; background: #000; border: 1px solid #555; border-radius: 2px; overflow: hidden; flex: 1; min-width: 60px; }
  .bar > div { height: 100%; transition: width 0.3s; }
  .bar.hp > div { background: #4cd24c; } .bar.hp.low > div { background: #e84c4c; } .bar.mp > div { background: #4c8ae8; }
  .barwrap { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 120px; }
  .barwrap span { font-size: 12px; white-space: nowrap; }
  #stage { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; padding: 12px; }
  .sprite { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
  .title-scene { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; text-align: center; }
  .title-scene h1 { font-size: 44px; letter-spacing: 10px; color: #ffd23b; text-shadow: 3px 3px 0 #000, 0 0 18px rgba(255,210,59,0.4); }
  .title-scene .sub { color: #b6b6d8; font-size: 15px; letter-spacing: 1px; }
  .title-scene .spr { margin: 4px 0; }
  .battle-scene { position: relative; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; }
  .enemy-icon { line-height: 1; }
  .enemy-icon.shake { animation: shake 0.3s; }
  .enemy-icon.dead { opacity: 0; transform: translateY(8px); transition: opacity 0.55s, transform 0.55s; }
  .spr.flash { animation: ewhite 0.2s; }
  @keyframes ewhite { 0%,100% { filter: none; } 40% { filter: brightness(3.5) saturate(0.2); } }
  @keyframes shake { 0%,100% { transform: translateX(0);} 25%{transform:translateX(-9px);} 75%{transform:translateX(9px);} }
  .enemy-name { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
  .enemy-tag { font-size: 12px; color: #ffb46a; }
  .enemy-hpbar { width: 70%; max-width: 300px; }
  .subunits { display: flex; gap: 24px; margin-top: 12px; }
  .unit { text-align: center; font-size: 12px; color: #c8c8e0; }
  .unit .u-spr { display: flex; justify-content: center; height: 48px; align-items: flex-end; }
  .unit .bar { width: 80px; margin: 4px auto 0; }
  .unit.out { opacity: 0.3; }
  .unit .u-state { color: #ff8a8a; }
  .unit .u-state.warn { color: #ffd23b; animation: blink 0.6s steps(1) infinite; }
  .dmgnum { position: absolute; left: 50%; top: 26%; font-weight: bold; font-size: 28px; color: #fff;
    text-shadow: 0 2px 0 #000, 2px 0 0 #000, -2px 0 0 #000, 0 -2px 0 #000; pointer-events: none; animation: dn 0.7s ease-out forwards; }
  .dmgnum.heal { color: #6cf06c; } .dmgnum.weak { color: #ffd23b; } .dmgnum.resist { color: #8a8a9a; }
  @keyframes dn { 0%{opacity:0;transform:translate(-50%,8px) scale(0.6);} 25%{opacity:1;transform:translate(-50%,-6px) scale(1.15);} 100%{opacity:0;transform:translate(-50%,-38px) scale(1);} }
  .map-scene h2 { color: #ffd23b; font-size: 18px; margin-bottom: 4px; letter-spacing: 1px; }
  .map-scene .map-sub { color: #b6b6d8; font-size: 13px; margin-bottom: 14px; line-height: 1.6; }
  .region { padding: 10px 12px; margin-bottom: 9px; display: flex; align-items: center; gap: 12px; }
  .region.locked { opacity: 0.4; } .region.locked .sprite { filter: grayscale(1) brightness(0.6); }
  .region.cleared { border-color: #4c8a4c; }
  .region .r-icon { width: 48px; display: flex; justify-content: center; }
  .region .r-info { flex: 1; } .region .r-name { font-weight: bold; letter-spacing: 1px; }
  .region .r-state { font-size: 13px; color: #b6b6d8; margin-top: 2px; }
  .region .r-state .alert { color: #ff8a8a; } .region .r-state .ok { color: #7ad17a; }
  .ending-scene { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; text-align: center; line-height: 2; }
  .ending-scene .the-beginning { font-size: 30px; letter-spacing: 5px; color: #ffd23b; margin-top: 10px; text-shadow: 2px 2px 0 #000; }
  #msgwin { display: none; margin: 0 8px; padding: 14px 16px; min-height: 92px; line-height: 1.8; cursor: pointer; letter-spacing: 0.5px; }
  #msgwin .next { color: #ffd23b; animation: blink 0.9s steps(1) infinite; float: right; margin-left: 8px; }
  @keyframes blink { 50% { opacity: 0; } }
  #cmds { margin: 8px; padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  #cmds:empty { display: none; }
  #cmds.framed { border: 3px solid #f4f4f8; border-radius: 6px; box-shadow: 0 0 0 2px #000; background: #0a0b1c; }
  button { position: relative; font-family: inherit; font-size: 16px; padding: 13px 12px 13px 26px; border: 2px solid #f4f4f8; border-radius: 5px;
    background: #0a0b1c; color: #f4f4f8; cursor: pointer; min-height: 50px; text-align: left; letter-spacing: 0.5px; }
  button::before { content: '▶'; position: absolute; left: 9px; opacity: 0; color: #ffd23b; }
  button:active { background: #f4f4f8; color: #0a0b1c; } button:active::before { opacity: 1; color: #0a0b1c; }
  button:disabled { opacity: 0.35; } button:disabled:active { background: #0a0b1c; color: #f4f4f8; } button:disabled:active::before { opacity: 0; }
  button.primary { border-color: #ffd23b; color: #ffd23b; } button.wide { grid-column: 1 / -1; }
  #flash { position: absolute; inset: 0; background: #ff2b2b; opacity: 0; pointer-events: none; z-index: 50; }
  #flash.on { animation: fl 0.22s; }
  @keyframes fl { 0%{opacity:0;} 30%{opacity:0.4;} 100%{opacity:0;} }
  /* ===== マップ ===== */
  .mapwrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
  .maptitle { color:#ffd23b; font-size:16px; letter-spacing:2px; }
  .maphint { color:#b6b6d8; font-size:12px; text-align:center; line-height:1.6; }
  .mapgrid { display:grid; border:3px solid #f4f4f8; box-shadow:0 0 0 2px #000; line-height:0; }
  .cell { width:30px; height:30px; position:relative; }
  .cell .bg { position:absolute; inset:0; }
  .cell .bg svg { width:30px; height:30px; display:block; }
  .cell .ov { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:17px; z-index:1; }
  .cell .ov svg { max-width:26px; max-height:26px; }
  .cell .ov.big { font-size:30px; z-index:5; overflow:visible; }
  .cell .ov.big svg { width:54px; height:54px; max-width:none; max-height:none; }
  .cell.loc::after { content:''; position:absolute; inset:0; box-shadow:inset 0 0 0 2px #ffd23b; pointer-events:none; z-index:3; }
  .cell.cur::after { box-shadow:inset 0 0 0 2px #6cf06c; }
  .cell.lock { filter:brightness(0.4); }
  .cell .lbl { position:absolute; bottom:0; left:0; right:0; text-align:center; font-size:8px; color:#fff; text-shadow:0 0 2px #000,1px 1px 0 #000; pointer-events:none; z-index:4; }
  .cell.tap::before { content:''; position:absolute; inset:0; box-shadow:inset 0 0 0 2px rgba(255,255,255,0.55); pointer-events:none; z-index:2; }
  .cell.tap:active { filter:brightness(1.4); }
</style>
</head>

function makeSprite(key, px) {
  const ck = key + '@' + px;
  if (_sprCache[ck]) return _sprCache[ck];
  const sp = SPRITES[key];
  if (!sp) return '';
  const rows = sp.rows, pal = sp.pal;
  const w = Math.max.apply(null, rows.map((r) => r.length)), h = rows.length;
  let rects = '';
  for (let y = 0; y < h; y++) {
    const row = rows[y];
    for (let x = 0; x < row.length; x++) {
      const col = pal[row[x]];
      if (!col) continue;
      rects += `<rect x="${x}" y="${y}" width="1.02" height="1.02" fill="${col}"/>`;
    }
  }
  const svg = `<svg class="sprite" viewBox="0 0 ${w} ${h}" width="${w * px}" height="${h * px}" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
  _sprCache[ck] = svg;
  return svg;
}

// ===== ダンジョン迷路（地域ごとに自動生成・決定的）=====
function mulberry32(a) { return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
function shuffle(arr, rng) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); const t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr; }
function genMaze(cw, ch, seed) {
  const W = cw * 2 + 1, H = ch * 2 + 1;
  const g = []; for (let y = 0; y < H; y++) g.push(new Array(W).fill('#'));
  const rng = mulberry32(seed);
  (function carve(cx, cy) {
    g[cy * 2 + 1][cx * 2 + 1] = '.';
    for (const d of shuffle([[1, 0], [-1, 0], [0, 1], [0, -1]], rng)) {
      const nx = cx + d[0], ny = cy + d[1];
      if (nx >= 0 && nx < cw && ny >= 0 && ny < ch && g[ny * 2 + 1][nx * 2 + 1] === '#') {
        g[cy * 2 + 1 + d[1]][cx * 2 + 1 + d[0]] = '.'; carve(nx, ny);
      }
    }
  })(0, 0);
  return g.map((r) => r.join(''));
}
const PUZZLE_OF = ['lights', 'sokoban', 'nim', 'mastermind', 'sphinx']; // 地域ごとの仕掛け（nim=大蛇／sphinx=ブラックボックス）
const PUZZLE2_OF = ['ricochet', 'hex', 'liar', 'numberlink', null]; // 追加部屋（反射ロボ／ヘックス／嘘つき門番／数つなぎ）
REGIONS.forEach((r, ri) => {
  const grid = genMaze(3, 3, 917 + ri * 131);
  const W = grid[0].length, H = grid.length;
  const cells = []; for (let y = 1; y < H; y += 2) for (let x = 1; x < W; x += 2) cells.push([x, y]);
  const ent = [1, 1], ex = [W - 2, H - 2];
  const cand = cells.filter((c) => !(c[0] === 1 && c[1] === 1) && !(c[0] === ex[0] && c[1] === ex[1]));
  shuffle(cand, mulberry32(5000 + ri));
  const K = r.list.length;
  const pz = PUZZLE_OF[ri], pc = (pz && cand.length > K) ? cand[K] : null;
  const pz2 = PUZZLE2_OF[ri], pc2 = (pz2 && cand.length > K + 1) ? cand[K + 1] : null;
  r._maze = {
    grid, W, H, ent, ex, rooms: cand.slice(0, K),
    puzzle: pc ? { x: pc[0], y: pc[1], type: pz } : null,
    puzzle2: pc2 ? { x: pc2[0], y: pc2[1], type: pz2 } : null,
  };
});

let typing = false, typeTimer = null, curTokens = null, curShown = 0;
function tokenize(str) {
  const out = []; const re = /(<[^>]+>)/g; let last = 0, m;
  while ((m = re.exec(str))) { for (const ch of str.slice(last, m.index)) out.push(ch); out.push(m[0]); last = re.lastIndex; }
  for (const ch of str.slice(last)) out.push(ch);
  return out;
}
function renderTyping() { msgwin.innerHTML = curTokens.slice(0, curShown).join('') + (typing ? '' : '<span class="next">▼</span>'); }
function showMsgs(msgs, done) { msgQueue = msgs.slice(); msgDone = done; setCmds([]); msgwin.style.display = 'block'; nextMsg(); }
function nextMsg() {
  if (msgQueue.length === 0) { msgwin.style.display = 'none'; const fn = msgDone; msgDone = null; if (fn) fn(); return; }
  curTokens = tokenize(msgQueue.shift()); curShown = 0; typing = true; renderTyping();
  clearInterval(typeTimer);
  typeTimer = setInterval(() => { curShown++; if (curShown >= curTokens.length) { curShown = curTokens.length; typing = false; clearInterval(typeTimer); } renderTyping(); }, 22);
}
msgwin.addEventListener('click', () => {
  if (typing) { curShown = curTokens.length; typing = false; clearInterval(typeTimer); renderTyping(); return; }
  if (msgDone || msgQueue.length) nextMsg();
});

function tileAt(x, y) { return (y < 0 || y >= W_H || x < 0 || x >= W_W) ? 'm' : WORLD[y][x]; }
function walkable(x, y) { const c = tileAt(x, y); return c !== 'm' && c !== 'w' && c !== 'v'; }
function regionAt(x, y) { const c = WORLD[y] && WORLD[y][x]; return (c >= '0' && c <= '4') ? +c : null; }
function isVillage(x, y) { return VILLAGE_POS && VILLAGE_POS.x === x && VILLAGE_POS.y === y; }
function terrainKey(t, x, y) { return t === 'w' ? 't_water' : t === 'm' ? 't_mtn' : t === 'c' ? 't_cloud' : t === 'v' ? 't_void' : ((x + y) % 2 ? 't_grass' : 't_grass2'); }

function spriteOv(key) { return `<div class="ov">${makeSprite(key, 1.5)}</div>`; }
function decorOv(key) { const sp = SPRITES[key]; const w = Math.max.apply(null, sp.rows.map((r) => r.length)), h = sp.rows.length; return `<div class="ov">${makeSprite(key, Math.max(1, Math.round(24 / Math.max(w, h))))}</div>`; }

function renderWorld() {
  renderHud(); save();

  const wrap = document.createElement('div'); wrap.className = 'mapwrap';
  const ttl = document.createElement('div'); ttl.className = 'maptitle';
  ttl.textContent = G.descended ? '🗺 世界地図 — 故郷へ' : '☁ 天空の魔王城'; wrap.appendChild(ttl);
  const grid = document.createElement('div'); grid.className = 'mapgrid'; grid.style.gridTemplateColumns = `repeat(${W_W},30px)`;
  for (let y = 0; y < W_H; y++) for (let x = 0; x < W_W; x++) {
    const t = WORLD[y][x];
    const cell = mkCell();
    cell.innerHTML = tileBg(terrainKey(t, x, y));
    const ri = regionAt(x, y);
    if (ri !== null) {
      const cur = ri === curRegion(), cleared = regionCleared(ri), revealed = ri <= curRegion();
      cell.className += ' loc' + (cur ? ' cur' : '') + (revealed ? '' : ' lock');
      cell.innerHTML += cleared ? '<div class="ov">✓</div>' : (revealed ? spriteOv(ENEMIES[REGIONS[ri].list[0]].sprite) : '<div class="ov">？</div>');
      cell.innerHTML += `<div class="lbl">${revealed ? REGIONS[ri].name : '？？？'}</div>`;
    } else if (isVillage(x, y)) {
      const open = allRegionsDone();
      cell.className += ' loc' + (open ? ' cur' : ' lock');
      cell.innerHTML += '<div class="ov">🏠</div><div class="lbl">故郷</div>';
    }
    if (x === G.heroX && y === G.heroY) cell.innerHTML += spriteOv('hero');
    if ((Math.abs(x - G.heroX) + Math.abs(y - G.heroY)) === 1 && walkable(x, y)) {
      cell.className += ' tap'; cell.onclick = () => worldTap(x, y);
    }
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  const hint = document.createElement('div'); hint.className = 'maphint';
  hint.innerHTML = G.descended ? 'まわりのマスをタップして移動。<br>この先に何があるかは——進んでみるまで分からない。' : '魔王城の残党を殲滅し、飛行艇で地上へ降りよ。';
  wrap.appendChild(hint);
  stage.appendChild(wrap);
  mapMenu(false);
}
function worldTap(x, y) {
  if ((Math.abs(x - G.heroX) + Math.abs(y - G.heroY)) !== 1 || !walkable(x, y)) return;
  G.heroX = x; G.heroY = y;
  const ri = regionAt(x, y);

}
function tryEnterRegion(ri) {
  if (regionCleared(ri)) { renderWorld(); return; }
  if (!regionUnlocked(ri)) { renderWorld(); showMsgs(['霧が濃く、まだ近づけない。手前の残党を片付けねば。'], renderWorld); return; }
  if (!G.firedEnter.includes(ri)) { G.firedEnter.push(ri); return runEvents(REGIONS[ri].onEnter, () => enterRegionAfterEvents(ri)); }
  enterRegionAfterEvents(ri);
}
function enterRegionAfterEvents(ri) { if (regionCleared(ri)) backToWorld(ri); else showDungeon(ri); }
function showDungeon(ri) { G.view = 'dungeon'; G.dungeonRegion = ri; const m = REGIONS[ri]._maze; G.dx = m.ent[0]; G.dy = m.ent[1]; renderDungeon(); }

  else { G.heroX = LOC[ri].x; G.heroY = LOC[ri].y; }

}

  else showMsgs(['まだ残党が残っている。村へは帰れない。'], renderWorld);
}

// 隣室への扉（迷路の通路が開いている方向）
function doorsAt(ri, x, y) {
  const g = REGIONS[ri]._maze.grid;
  return { N: !!(g[y - 1] && g[y - 1][x] !== '#'), S: !!(g[y + 1] && g[y + 1][x] !== '#'),
           W: g[y][x - 1] !== '#', E: g[y][x + 1] !== '#' };
}
// 部屋の装飾を決定的に配置（部屋ごとに変化）
function roomDecor(ri) {
  const cfg = DECOR[ri], rng = mulberry32(ri * 733 + G.dx * 37 + G.dy * 11);
  const slots = shuffle([[1, 1], [7, 1], [1, 5], [7, 5], [2, 4], [6, 4]], rng);
  const n = 2 + Math.floor(rng() * 3), map = {};
  for (let i = 0; i < n; i++) map[slots[i][0] + ',' + slots[i][1]] = cfg.items[Math.floor(rng() * cfg.items.length)];
  return { pillar: cfg.pillar, map };
}
// ダンジョンは「1部屋ずつ」全画面表示。スワイプ/矢印で隣の部屋へ。歩き回りはしない。
function renderDungeon() {
  renderHud(); save();
  const ri = G.dungeonRegion, reg = REGIONS[ri], mz = reg._maze;
  const floor = REGION_FLOOR[ri], done = regionCleared(ri), decor = roomDecor(ri);
  const idx = roomAt(ri, G.dx, G.dy);
  const isExit = G.dx === mz.ex[0] && G.dy === mz.ex[1];
  const isEnt = G.dx === mz.ent[0] && G.dy === mz.ent[1];
  const enemyHere = idx >= 0 && !G.cleared[ri][idx];
  const here = (mz.puzzle && mz.puzzle.x === G.dx && mz.puzzle.y === G.dy) ? mz.puzzle
    : (mz.puzzle2 && mz.puzzle2.x === G.dx && mz.puzzle2.y === G.dy) ? mz.puzzle2 : null;
  const onPuzzle = !!here;
  const pzDone = here ? !!G.puzzleSolved[here.type] : false;
  const doors = doorsAt(ri, G.dx, G.dy);
  const left = reg.list.filter((k, i) => !G.cleared[ri][i]).length;

  stage.innerHTML = '';
  const wrap = document.createElement('div'); wrap.className = 'mapwrap';
  const ttl = document.createElement('div'); ttl.className = 'maptitle';
  ttl.textContent = '🏛 ' + reg.name + (done ? '（殲滅済）' : `　残り${left}体`); wrap.appendChild(ttl);

  const COLS = 9, ROWS = 7, CX = 4, DY = 3;
  const grid = document.createElement('div'); grid.className = 'mapgrid'; grid.style.gridTemplateColumns = `repeat(${COLS},30px)`;
  for (let ry = 0; ry < ROWS; ry++) for (let rx = 0; rx < COLS; rx++) {
    const edge = ry === 0 || ry === ROWS - 1 || rx === 0 || rx === COLS - 1;
    let dir = '';
    if (ry === 0 && rx === CX && doors.N) dir = 'N';
    else if (ry === ROWS - 1 && rx === CX && doors.S) dir = 'S';
    else if (rx === 0 && ry === DY && doors.W) dir = 'W';
    else if (rx === COLS - 1 && ry === DY && doors.E) dir = 'E';
    const isDoor = !!dir;
    const cell = mkCell();
    cell.innerHTML = tileBg(edge && !isDoor ? 'd_wall' : floor);
    if (ry === 0 && (rx === 2 || rx === COLS - 3)) cell.innerHTML += decorOv('torch'); // 壁の松明
    if (isDoor) { cell.className += ' tap'; cell.innerHTML += `<div class="ov">${{ N: '⬆️', S: '⬇️', W: '⬅️', E: '➡️' }[dir]}</div>`; cell.onclick = () => moveRoom(dir); }
    if (ry === 2 && (rx === 2 || rx === COLS - 3)) cell.innerHTML += decorOv(decor.pillar); // 柱
    const dk = rx + ',' + ry;
    if (decor.map[dk]) cell.innerHTML += decorOv(decor.map[dk]); // 小物
    if (rx === CX && ry === 2) {
      if (enemyHere) cell.innerHTML += `<div class="ov big">${makeSprite(ENEMIES[reg.list[idx]].sprite, 2.4)}</div>`;
      else if (onPuzzle) cell.innerHTML += pzDone ? '<div class="ov">✓</div>' : (here.type === 'nim' ? spriteOv('orochi') : here.type === 'liar' ? spriteOv('soldier') : here.type === 'sphinx' ? decorOv('statue') : decorOv('chest'));
      else if (isExit) cell.innerHTML += '<div class="ov big">🔻</div>';
      else if (idx >= 0) cell.innerHTML += '<div class="ov">💀</div>';
      else if (isEnt) cell.innerHTML += '<div class="ov">🚪</div>';

    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  const hint = document.createElement('div'); hint.className = 'maphint';
  hint.innerHTML = enemyHere ? '残党がいる！　戦うか、扉の方へスワイプして去るか。'
    : (onPuzzle && !pzDone) ? (here.type === 'nim' ? '残党が多頭の大蛇とともに待ち構えている。頭脳戦を挑むか。' : here.type === 'liar' ? '残党の門番たちが立ちふさがる。誰の言葉が嘘か、見破るか。' : '封印された宝箱だ。挑戦して中身を頂くか？')
    : (isExit && done) ? '🔻 階段がある。おりて次の地へ。'
    : (done ? '残党は全滅した。🔻 階段（出口）を探せ。' : '扉（矢印）の方へスワイプ／タップで隣の部屋へ。');
  wrap.appendChild(hint);
  stage.appendChild(wrap);
  attachSwipe(wrap, moveRoom);

  let ctx = null;
  if (enemyHere) ctx = { fight: { key: reg.list[idx], idx } };
  else if (onPuzzle && !pzDone) ctx = { puzzle: here.type };
  else if (isExit && done) ctx = { descend: true };
  mapMenu(true, ctx);
}
function moveRoom(dir) {
  if (G.view !== 'dungeon') return;
  const ri = G.dungeonRegion, g = REGIONS[ri]._maze.grid;
  const d = { N: [0, -1], S: [0, 1], W: [-1, 0], E: [1, 0] }[dir]; if (!d) return;
  const wx = G.dx + d[0], wy = G.dy + d[1];
  if (!g[wy] || g[wy][wx] === '#') return; // 扉がない
  G.dx += d[0] * 2; G.dy += d[1] * 2;
  renderDungeon();
}
function descendStairs() {
  const ri = G.dungeonRegion;
  if (!G.firedClear.includes(ri)) { G.firedClear.push(ri); return runEvents(REGIONS[ri].onClear, () => backToWorld(ri)); }
  backToWorld(ri);
}
let _swipe = null;
function attachSwipe(el, onDir) {
  const start = (x, y) => { _swipe = { x, y }; };
  const end = (x, y) => {
    if (!_swipe) return; const dx = x - _swipe.x, dy = y - _swipe.y; _swipe = null;
    if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
    onDir(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'E' : 'W') : (dy > 0 ? 'S' : 'N'));
  };
  el.addEventListener('touchstart', (e) => { const t = e.changedTouches[0]; start(t.clientX, t.clientY); }, { passive: true });
  el.addEventListener('touchend', (e) => { const t = e.changedTouches[0]; end(t.clientX, t.clientY); }, { passive: true });
  el.addEventListener('mousedown', (e) => start(e.clientX, e.clientY));
  el.addEventListener('mouseup', (e) => end(e.clientX, e.clientY));
}

// ===== パズル部屋（任意・宝箱）=====
const PUZZLE_NAME = { nim: '大蛇', lights: '消えずの篝火', sokoban: '鉄箱の倉', mastermind: '封印の錠前', sphinx: 'スフィンクスの匣', liar: '門番の問答', ricochet: '滑る魔像', hex: 'ヘックス', numberlink: '数つなぎ' };

  else if (type === 'sokoban') sokoInit();
  else if (type === 'sphinx') bbInit();
  else if (type === 'liar') liarInit();
  else if (type === 'ricochet') ricoInit();

  else if (type === 'numberlink') nlInit();

}
function puzzleGrid(cols) { const g = document.createElement('div'); g.className = 'mapgrid'; g.style.gridTemplateColumns = `repeat(${cols},30px)`; g.style.margin = '4px auto'; return g; }
function puzzleFrame(title, body, controls, sub, onSwipe) {
  renderHud();
  stage.innerHTML = '';
  const wrap = document.createElement('div'); wrap.className = 'mapwrap';
  const t = document.createElement('div'); t.className = 'maptitle'; t.textContent = '🧩 ' + title; wrap.appendChild(t);
  wrap.appendChild(body);
  const h = document.createElement('div'); h.className = 'maphint'; h.innerHTML = sub; wrap.appendChild(h);
  stage.appendChild(wrap);

}
function puzzleQuit() { PZ = null; renderDungeon(); }
function puzzleSolved() {
  G.puzzleSolved[PZ.type] = true; G.herbs += 2; PZ = null; renderHud(); save();
  showMsgs(['🎉 封印が解けた！　宝箱が開く。', 'やくそうを2つ手に入れた。'], () => renderDungeon());
}
// --- 残党の多頭大蛇（中身はニム/石取り）: 残党との頭脳戦。勝てば撃退、負ければ返り討ち ---
function orochiIntro(ri) {
  PZ = { type: 'nim', ri };
  const necks = [3, 4, 5];
  showMsgs([
    '行く手をふさいだのは、魔王軍の残党と——彼らが飼い慣らした多頭の大蛇だった。',
    `残党の頭目「我らの愛蛇と、知恵比べといこうか。${necks.length}本の首、斬れるのは一手につき一本のみ」`,
    '頭目「そちらが斬れば、こちらも愛蛇に首を喰い切らせる。交互だ」',
    '最後の一節を落とした側が、この頭脳戦を制する。先手はこちらに譲られた。',
  ], () => {
    setCmds([
      { label: '🐍 頭脳戦に応じる', primary: true, wide: true, fn: () => { PZ = { type: 'nim', ri, piles: necks.slice() }; orochiRender(''); } },
      { label: '引き返す', wide: true, fn: () => { PZ = null; renderDungeon(); } },
    ], true);
  });
}
function orochiRender(msg) {
  const body = document.createElement('div');
  PZ.piles.forEach((p, i) => {
    const row = puzzleGrid(Math.max(1, p));
    for (let j = 0; j < p; j++) { const c = mkCell(); c.innerHTML = decorOv('snakehead'); c.className += ' tap'; const take = p - j; c.onclick = () => orochiCut(i, take); row.appendChild(c); }
    body.appendChild(row);
  });
  puzzleFrame('残党の大蛇 — 頭脳戦', body, [], (msg ? msg + '<br>' : '') + '首をタップ＝その首から先の節をまとめて斬る。<b>最後の一節を落とした方が勝ち</b>。（退けない）');
}
function nimOver() { return PZ.piles.every((p) => p === 0); }
function orochiCut(i, n) {
  PZ.piles[i] -= n;
  if (nimOver()) return orochiWin();
  const p = PZ.piles; let x = 0; p.forEach((v) => x ^= v); let moved = false;
  if (x !== 0) { for (let k = 0; k < p.length; k++) { const t = p[k] ^ x; if (t < p[k]) { p[k] = t; moved = true; break; } } }
  if (!moved) { let mi = 0; p.forEach((v, k) => { if (v > p[mi]) mi = k; }); if (p[mi] > 0) p[mi]--; }
  if (nimOver()) return orochiLose();
  orochiRender('頭目の合図で、大蛇が自らの首を喰い切った。あなたの番。');
}
function orochiWin() {
  const before = lvOf(); G.puzzleSolved[PZ.type] = true; PZ = null;
  G.wear = Math.max(0, G.wear - 4); G.herbs += 2;
  const after = lvOf(); renderHud(); save();
  showMsgs([
    '最後の首が地に落ちた。大蛇は力尽き、頭目は舌打ちして退いていく。',
    after > before ? `頭脳戦を制した昂りで、体に力がみなぎる。レベルが ${after} に回復した！` : '頭脳戦を制し、体に力がみなぎった。',
    '残党が遺した荷から、やくそうを2つ見つけた。',
  ], () => renderDungeon());
}
function orochiLose() {
  const before = lvOf(); G.puzzleSolved[PZ.type] = true; PZ = null;
  G.wear += 4;
  const s = stats(); G.hp = Math.min(G.hp, s.maxHp); G.mp = Math.min(G.mp, s.maxMp);
  const after = lvOf(); renderHud(); save();
  showMsgs([
    '最後の首を喰い切ったのは、頭目に操られた大蛇のほうだった。',
    `頭目「読み負けたな」——振り抜かれた尾に打ち据えられ、英雄の力が削れる。レベルが ${after} に下がった……`,
    '（被弾と同じだ。失った強さは戻らない）',
  ], () => renderDungeon());
}
// --- スフィンクスの匣（ブラックボックス）: 隠れた3つの石を光線で推理する ---
const BB_N = 6;
function bbPorts() {
  const ps = [];
  for (let i = 0; i < BB_N; i++) { ps.push([i, -1]); ps.push([i, BB_N]); ps.push([-1, i]); ps.push([BB_N, i]); }
  return ps;
}
function bbTrace(atoms, sx, sy) {
  // sx,sy は外周ポート。最初の進行方向は盤内向き。物理的に可逆な光線追跡。
  let x = sx, y = sy;
  let dx = sx < 0 ? 1 : sx >= BB_N ? -1 : 0;
  let dy = sy < 0 ? 1 : sy >= BB_N ? -1 : 0;
  let first = true;
  for (let guard = 0; guard < 5000; guard++) {
    const nx = x + dx, ny = y + dy;
    const tlx = dy, tly = -dx, trx = -dy, trry = dx; // 左折・右折ベクトル
    const aL = atoms.has((nx + tlx) + ',' + (ny + tly)); // 左前角
    const aR = atoms.has((nx + trx) + ',' + (ny + trry)); // 右前角
    if (first) { if (aL || aR) return sx + ',' + sy; first = false; } // 入口で角に石→反射(R)
    if (atoms.has(nx + ',' + ny)) return 'H'; // 正面に石→吸収(H)
    if (aL && aR) { dx = -dx; dy = -dy; } // 両前角→反転
    else if (aL) { dx = trx; dy = trry; } // 左前角→右へそれる
    else if (aR) { dx = tlx; dy = tly; } // 右前角→左へそれる
    else {
      x = nx; y = ny;
      if (x < 0 || x >= BB_N || y < 0 || y >= BB_N) return x + ',' + y; // 外周へ脱出
    }
  }
  return 'H';
}
function bbSig(atoms) { const m = {}; bbPorts().forEach((p) => { m[p[0] + ',' + p[1]] = bbTrace(atoms, p[0], p[1]); }); return m; }
function bbInit() {
  PZ = { type: 'sphinx', ri: PZ ? PZ.ri : G.dungeonRegion };
  const rng = mulberry32(PZ.ri * 1777 + 29);
  const secret = new Set();
  while (secret.size < 3) { const x = Math.floor(rng() * BB_N), y = Math.floor(rng() * BB_N); secret.add(x + ',' + y); }
  PZ.secret = secret; PZ.sig = bbSig(secret);
  PZ.fired = {}; PZ.label = 1; PZ.guess = new Set();
  bbRender('');
}
function bbFire(px, py) {
  const k = px + ',' + py; if (PZ.fired[k]) return;
  const res = PZ.sig[k];
  if (res === 'H') PZ.fired[k] = 'H';
  else if (res === k) PZ.fired[k] = 'R';
  else { const n = PZ.label++; PZ.fired[k] = n; PZ.fired[res] = n; }
  bbRender('');
}
function bbToggleGuess(x, y) {
  const k = x + ',' + y;
  if (PZ.guess.has(k)) PZ.guess.delete(k);
  else { if (PZ.guess.size >= 3) return bbRender('石は3つまで。'); PZ.guess.add(k); }
  bbRender('');
}
function bbPortLabel(k) {
  const v = PZ.fired[k]; if (v === undefined) return null;
  if (v === 'H') return '<div class="ov" style="color:#ff5a5a;font-weight:bold">✕</div>';
  if (v === 'R') return '<div class="ov" style="color:#7fd0ff;font-weight:bold">R</div>';
  const hue = (v * 67) % 360;
  return `<div class="ov" style="color:hsl(${hue},90%,70%);font-weight:bold">${v}</div>`;
}
function bbRender(msg) {
  const N = BB_N, body = puzzleGrid(N + 2);
  for (let gy = -1; gy <= N; gy++) for (let gx = -1; gx <= N; gx++) {
    const c = mkCell();
    const corner = (gx < 0 || gx >= N) && (gy < 0 || gy >= N);
    const edge = !corner && (gx < 0 || gx >= N || gy < 0 || gy >= N);
    const inside = gx >= 0 && gx < N && gy >= 0 && gy < N;
    if (corner) { c.innerHTML = '<div class="ov" style="opacity:.15">·</div>'; body.appendChild(c); continue; }
    if (edge) {
      const k = gx + ',' + gy, lbl = bbPortLabel(k);
      c.innerHTML = tileBg('d_wall');
      if (lbl) c.innerHTML += lbl; else { c.innerHTML += '<div class="ov" style="opacity:.5">◦</div>'; c.className += ' tap'; c.onclick = () => bbFire(gx, gy); }
      body.appendChild(c); continue;
    }
    if (inside) {
      const k = gx + ',' + gy; c.innerHTML = tileBg('f_fort'); c.className += ' tap';
      if (PZ.guess.has(k)) c.innerHTML += '<div class="ov" style="color:#ffd23b;font-size:20px">●</div>';
      c.onclick = () => bbToggleGuess(gx, gy);
      body.appendChild(c);
    }
  }

    { label: '←', fn: () => sokoMove('W') }, { label: '→', fn: () => sokoMove('E') },
    { label: '↑', fn: () => sokoMove('N') }, { label: '↓', fn: () => sokoMove('S') },
    { label: '↺ やり直す', fn: sokoInit }, { label: '↩ あきらめる', fn: puzzleQuit },
  ], '箱を ◎ 印に全部のせる。スワイプ／矢印／隣マスタップで移動。', sokoMove);
}
// --- 数当て（マスターマインド / 錠前）---
function mmInit() {
  const rng = mulberry32(PZ.ri * 321 + 13); PZ.code = [];
  for (let i = 0; i < 4; i++) PZ.code.push(1 + Math.floor(rng() * 6));
  PZ.guess = [1, 1, 1, 1]; PZ.history = []; PZ.max = 10; mmRender('');
}
function mmFeedback(g, code) {
  let hit = 0, blow = 0; const c = code.slice(), gg = g.slice();
  for (let i = 0; i < 4; i++) if (gg[i] === c[i]) { hit++; gg[i] = -1; c[i] = -2; }
  for (let i = 0; i < 4; i++) if (gg[i] > 0) { const j = c.indexOf(gg[i]); if (j >= 0) { blow++; c[j] = -2; } }
  return { hit, blow };
}
function mmRender(msg) {
  const body = document.createElement('div');
  PZ.history.forEach((h) => { const r = document.createElement('div'); r.className = 'maphint'; r.style.margin = '2px'; r.innerHTML = `${h.g.join(' ')} → ◉${h.hit}　○${h.blow}`; body.appendChild(r); });
  const row = puzzleGrid(4);
  PZ.guess.forEach((v, i) => { const c = mkCell(); c.innerHTML = tileBg('f_fort'); c.innerHTML += `<div class="ov" style="font-size:18px;font-weight:bold;color:#ffd23b">${v}</div>`; c.className += ' tap'; c.onclick = () => { PZ.guess[i] = PZ.guess[i] % 6 + 1; mmRender(msg); }; row.appendChild(c); });
  body.appendChild(row);
  puzzleFrame('封印の錠前 — 数当て', body, [
    { label: '🔓 決定', primary: true, wide: true, fn: mmSubmit }, { label: '↩ あきらめる', wide: true, fn: puzzleQuit },
  ], (msg ? msg + '<br>' : '') + `数字（上のマスをタップで 1〜6 切替）を合わせろ。◉=位置も一致／○=数字だけ一致。残り ${PZ.max - PZ.history.length} 回。`);
}
function mmSubmit() {
  const fb = mmFeedback(PZ.guess, PZ.code);
  PZ.history.push({ g: PZ.guess.slice(), hit: fb.hit, blow: fb.blow });
  if (fb.hit === 4) return puzzleSolved();
  if (PZ.history.length >= PZ.max) { showMsgs(['錠前は固く閉じたまま……', '（もう一度挑戦できる）'], () => mmInit()); return; }
  mmRender('');
}

// ===== 戦闘 =====
const rand = () => 0.85 + Math.random() * 0.3;
const phys = (atk, def) => Math.max(1, Math.round((atk - def / 2) * rand()));
function physEff(e) { return e.kind === 'squad' ? 1.0 : 0.15; }
function magMult(e, elem) {
  if (e.kind === 'fire')    return elem === 'fire' ? 2.0 : 0.4;
  if (e.kind === 'thunder') return elem === 'thunder' ? 2.0 : 0.4;
  return 1.0; // magic / regen / squad はどの属性でも等倍
}
function squadDps(e) { return e.kind === 'squad' ? Math.round(e.hp * 0.14) : Math.round(e.hp * 0.07); }

function startBattle(key, region, roomIdx) {
  const e = ENEMIES[key];
  battle = { key, e, isFinale: false, region, roomIdx, lvStart: lvOf(), hp: e.hp, maxHp: e.hp,
             hostage: { hp: 40, max: 40, dead: false }, soldier: { down: false },
             breathTimer: (e.threat === 'breath' ? 3 : -1), guarding: false };
  renderBattle(e, false);
  let intro = [`${e.name} があらわれた！`, `${e.name}は市民を人質に取っている！`];
  if (!G.seenHint[key]) { G.seenHint[key] = true; intro = intro.concat(e.hint); }
  if (e.threat === 'breath') intro.push('体の奥が、赤く光りはじめている……（ブレスの予兆）');
  showMsgs(intro, battleMenu);
}
function startFinale() {
  battle = { key: 'finale', e: FINALE, isFinale: true, lvStart: lvOf(), hp: FINALE.hp, maxHp: FINALE.hp,
             hostage: null, soldier: null, breathTimer: -1, guarding: false };
  renderBattle(FINALE, true);
  showMsgs([
    `${FINALE.name} があらわれた！`,
    'これが世界に残された、最後の魔物だ。',
    '人質はいない。討伐隊もいない。仲間もいない。',
    'ただ一匹の魔物と、一人の人間が向かい合うだけだ。',
    'スライムが、こんなに大きく見えたことがあっただろうか。',
  ], battleMenu);
}
function renderBattle(e, isFinale) {
  const px = isFinale ? 13 : 9;
  let sub = '';
  if (!isFinale) {
    sub = `<div class="subunits">
      <div class="unit" id="u-citizen"><div class="u-spr">${makeSprite('citizen', 4)}</div>市民（人質）
        <div class="bar hp"><div id="c-hp" style="width:100%"></div></div></div>
      <div class="unit" id="u-ally"><div class="u-spr">${makeSprite('soldier', 4)}</div>討伐隊の兵士
        <div class="u-state" id="a-state">突撃中！</div></div>
    </div>`;
  }
  stage.innerHTML = `<div class="battle-scene">
      <div class="enemy-icon" id="e-icon"><div class="spr" id="e-spr">${makeSprite(e.sprite, px)}</div></div>
      <div class="enemy-name">${e.name}</div>
      ${e.tag && !isFinale ? `<div class="enemy-tag">【${e.tag}】</div>` : ''}
      <div class="bar hp enemy-hpbar"><div id="e-hp" style="width:100%"></div></div>
      ${sub}</div>`;
}

function battleMenu() {
  renderHud();
  const list = [
    { label: '⚔️ たたかう', primary: true, fn: playerAttack },
    { label: '✨ じゅもん', fn: spellMenu },
    { label: '🎒 どうぐ', fn: itemMenu },
    { label: '🛡 ぼうぎょ', fn: playerDefend },
  ];
  if (!battle.isFinale) {
    if (battle.soldier && !battle.soldier.down)
      list.push({ label: '⚡ みねうち（兵士）', fn: playerMineuchi });
    list.push({ label: '🛡 かばう（人質）', disabled: battle.hostage.dead, fn: playerGuard });
    list.push({ label: '🏳 見捨てて進む', fn: sacrificeBattle });
  }
  setCmds(list, true);
}
function spellMenu() {
  const list = SPELLS.map((sp) => {
    const weak = lvOf() < sp.minLv, noMp = G.mp < sp.mp;
    let label = `${sp.name}（魔力${sp.mp}）`;
    if (weak) label = `${sp.name}（力不足）`;
    return { label, disabled: weak || noMp, fn: () => castSpell(sp) };
  });
  list.push({ label: '← もどる', wide: true, fn: battleMenu });
  setCmds(list, true);
}
function itemMenu() {
  const s = stats();
  setCmds([
    { label: `🌿 やくそう (×${G.herbs})`, primary: true, disabled: G.herbs <= 0 || G.hp >= s.maxHp, fn: useHerbBattle },
    { label: '← もどる', fn: battleMenu },
  ], true);
}

// --- プレイヤー行動 ---
function playerAttack() {
  battle.guarding = false;
  const s = stats(), e = battle.e;
  let d = Math.max(1, Math.round(phys(s.atk, e.def) * physEff(e)));
  battle.hp = Math.max(0, battle.hp - d);
  hitEnemy(d, physEff(e) < 1 ? 'resist' : '');
  const msgs = [`勇者のこうげき！　${e.name}に ${d} のダメージ！`];
  if (physEff(e) < 1) msgs.push('——ほとんど効いていない！');
  if (e.counter && battle.hp > 0) {
    const cd = phys(e.atk, s.def);
    takeHit(cd); msgs.push(`${e.name}の反撃！　勇者は ${cd} のダメージ！　力が削れた……`);
    if (G.hp <= 0) { showMsgs(msgs, defeat); return; }
    resolveTurn(msgs, false); // 反撃済みなので通常反撃はなし
    return;
  }
  resolveTurn(msgs, true);
}
function castSpell(sp) {
  battle.guarding = false;
  const s = stats(), e = battle.e;
  G.mp -= sp.mp; const msgs = [sp.flavor];
  if (sp.kind === 'heal') {
    const heal = Math.min(s.maxHp - G.hp, Math.round(s.maxHp * sp.power)); G.hp += heal;
    spawnDamage(heal, 'heal'); msgs.push(`HPが ${heal} 回復した。`); renderHud();
    resolveTurn(msgs, false); return; // 回復は反撃を受けない
  }
  let d;
  if (sp.kind === 'phys') {
    d = Math.max(1, Math.round(phys(s.atk, e.def) * sp.mult * physEff(e)));
  } else {
    const mult = magMult(e, sp.kind);
    d = Math.max(1, Math.round(sp.power * s.matk * rand() * mult));
    if (mult >= 2) msgs.push('弱点を突いた！'); else if (mult < 1) msgs.push('効果はいまひとつだ……');
  }
  battle.hp = Math.max(0, battle.hp - d);
  const tag = sp.kind === 'phys' ? (physEff(e) < 1 ? 'resist' : '') : (magMult(e, sp.kind) >= 2 ? 'weak' : (magMult(e, sp.kind) < 1 ? 'resist' : ''));
  hitEnemy(d, tag);
  msgs.push(`${e.name}に ${d} のダメージ！`);
  if (sp.kind === 'phys' && e.counter && battle.hp > 0) {
    const cd = phys(e.atk, s.def); takeHit(cd); msgs.push(`${e.name}の反撃！　勇者は ${cd} のダメージ！`);
    if (G.hp <= 0) { showMsgs(msgs, defeat); return; }
    resolveTurn(msgs, false); return;
  }
  // じゅもん（遠隔）は反撃を受けない。物理技は受ける
  resolveTurn(msgs, sp.kind === 'phys');
}
function useHerbBattle() {
  battle.guarding = false;
  const s = stats(); G.herbs--;
  const heal = Math.min(s.maxHp - G.hp, Math.round(s.maxHp * HERB_HEAL_RATE)); G.hp += heal;
  spawnDamage(heal, 'heal'); renderHud();
  resolveTurn([`やくそうを使った。HPが ${heal} 回復した。`], false);
}
function playerDefend() {
  battle.guarding = false;
  resolveTurn(['勇者は身を守っている。'], false); // 防御＝攻撃しない＝反撃なし。討伐隊に任せる
}
function playerMineuchi() {
  battle.guarding = false;
  battle.soldier.down = true;
  const ua = $('u-ally'); if (ua) ua.classList.add('out');
  const as = $('a-state'); if (as) { as.textContent = '気絶'; as.classList.remove('warn'); }
  resolveTurn(['勇者のみねうち！　当て身で討伐隊の兵士を気絶させた！', 'これで流れ弾は止まった。', '兵士「ぐ……なぜ、味方の私を……」'], true);
}
function playerGuard() {
  battle.guarding = true;
  resolveTurn(['勇者は人質の前に立ちはだかった！'], true);
}
function sacrificeBattle() {
  const e = battle.e, region = battle.region, roomIdx = battle.roomIdx;
  const hadHostage = battle.hostage && !battle.hostage.dead;
  if (hadHostage) G.lost++;
  G.cleared[region][roomIdx] = true;
  battle = null; renderHud(); save();
  showMsgs([
    '勇者は背を向けた。守らない、という選択。',
    hadHostage ? `討伐隊が${e.name}を片づける——人質もろとも。` : `討伐隊が${e.name}を片づけた。`,
    `残党は あと${remaining()}体。`,
  ], afterBattleFlow);
}

// --- 被弾＝恒久ステ低下 ---
function takeHit(d) { G.hp = Math.max(0, G.hp - d); G.wear += WEAR_PER_HIT; flashScreen(); renderHud(); }

// --- 敵・討伐隊・人質のターン ---
function resolveTurn(msgs, drewAggro) {
  renderHud();
  if (battle.hp <= 0) { showMsgs(msgs, victory); return; }
  const e = battle.e;

  if (battle.isFinale) {
    // 一騎打ち：敵はこちらだけを狙う
    const s = stats(); const ed = phys(e.atk, s.def); takeHit(ed);
    msgs.push(`${e.name}のこうげき！　勇者は ${ed} のダメージ！`);
    if (G.hp <= 0) { showMsgs(msgs, defeat); return; }
    showMsgs(msgs, battleMenu); return;
  }

  // 再生
  if (e.kind === 'regen' && battle.hp > 0) {
    const rg = Math.round(e.hp * 0.05); battle.hp = Math.min(battle.maxHp, battle.hp + rg);
    setEnemyHpBar(); msgs.push(`${e.name}は再生した！（+${rg}）`);
  }
  // 討伐隊が敵を削る
  const sd = squadDps(e); battle.hp = Math.max(0, battle.hp - sd);
  setEnemyHpBar();
  msgs.push(`討伐隊の攻撃！　${e.name}に ${sd} のダメージ！`);
  if (battle.hp <= 0) { showMsgs(msgs, victory); return; }

  // 人質への脅威
  hostageThreat(msgs);
  if (G.hp <= 0) { showMsgs(msgs, defeat); return; }
  if (e.threat === 'breath' && battle.breathTimer === 1 && !battle.hostage.dead)
    msgs.push(`${e.name}の喉が赤熱している……次のターン、ブレスが人質を焼く！（「かばう」か倒し切れ）`);

  // 敵の反撃（こちらが手を出した時のみ）
  if (drewAggro) {
    const s = stats(); const ed = phys(e.atk, s.def); takeHit(ed);
    msgs.push(`${e.name}のこうげき！　勇者は ${ed} のダメージを受けた！`);
    if (G.hp <= 0) { showMsgs(msgs, defeat); return; }
  }
  // 弱点更新表示
  if (battle.e.threat === 'breath' && battle.breathTimer >= 0) updateBreathWarn();
  showMsgs(msgs, battleMenu);
}

function hostageThreat(msgs) {
  if (battle.hostage.dead) return;
  const e = battle.e, sol = battle.soldier && !battle.soldier.down;
  let inflict = 0, byEnemy = false;
  if (e.threat === 'splash' && sol) inflict = 16 + Math.floor(Math.random() * 9);
  else if (e.threat === 'fast' && sol) inflict = (16 + Math.floor(Math.random() * 9)) * 2;
  else if (e.threat === 'direct') { inflict = 18 + Math.floor(Math.random() * 7); byEnemy = true; }
  else if (e.threat === 'breath') {
    battle.breathTimer--;
    if (battle.breathTimer <= 0) { inflict = 999; byEnemy = true; battle.breathTimer = 3; }
  }
  if (inflict <= 0) return;
  if (battle.guarding) {
    const dd = Math.min(inflict, byEnemy ? 30 : inflict);
    takeHit(dd);
    msgs.push(`巻き込みの一撃を勇者が受け止めた！　${dd} のダメージ！`);
  } else {
    battle.hostage.hp = Math.max(0, battle.hostage.hp - inflict);
    setCitizenBar();
    msgs.push(byEnemy ? `${e.name}が人質を直接襲った！　市民に ${Math.min(inflict,99)} のダメージ！`
                      : `攻撃が市民を巻き込んだ！　市民に ${inflict} のダメージ！`);
    if (battle.hostage.hp <= 0) {
      battle.hostage.dead = true; const uc = $('u-citizen'); if (uc) uc.classList.add('out');
      msgs.push('市民は倒れてしまった……');
    }
  }
}
function updateBreathWarn() {
  const as = $('a-state'); // ブレス予告は敵名の下に出すのは難しいので兵士欄を流用しない。簡易に。
  // breathTimer 1 で次ターン発射
}

function hitEnemy(d, tag) {
  const icon = $('e-icon'), spr = $('e-spr');
  if (icon) { icon.classList.remove('shake'); void icon.offsetWidth; icon.classList.add('shake'); }
  if (spr) { spr.classList.remove('flash'); void spr.offsetWidth; spr.classList.add('flash'); }
  if (typeof d === 'number') spawnDamage(d, tag);
  setEnemyHpBar();
}
function setEnemyHpBar() { const b = $('e-hp'); if (b) b.style.width = Math.round(battle.hp / battle.maxHp * 100) + '%'; }
function setCitizenBar() { const b = $('c-hp'); if (b) b.style.width = Math.round(battle.hostage.hp / battle.hostage.max * 100) + '%'; }
function spawnDamage(d, tag) {
  const sc = document.querySelector('.battle-scene'); if (!sc) return;
  const el = document.createElement('div');
  el.className = 'dmgnum' + (tag ? ' ' + tag : '');
  el.textContent = (tag === 'heal' ? '+' : '') + d; sc.appendChild(el);
  setTimeout(() => el.remove(), 700);
}
function flashScreen() { const f = $('flash'); if (!f) return; f.classList.remove('on'); void f.offsetWidth; f.classList.add('on'); }

// ===== 勝敗 =====
function victory() {
  const ei = $('e-icon'); if (ei) ei.classList.add('dead');
  const e = battle.e;
  const msgs = [`${e.name} をたおした！`];
  if (battle.isFinale) { G.finaleDone = true; battle = null; save(); showMsgs(msgs, () => showEnding()); return; }

  if (!battle.hostage.dead) { G.saved++; G.herbs++; msgs.push('市民を守りきった！　やくそうを1つもらった。'); }
  else { G.lost++; msgs.push('討伐隊「作戦成功。報告書には犠牲者0と書いておきます」'); }

  G.cleared[battle.region][battle.roomIdx] = true;
  const paid = Math.min(G.gold, e.gold || 0); G.gold -= paid;
  if (paid > 0) msgs.push(`復興支援金として ${paid.toLocaleString()}G を徴収された。`);
  msgs.push(`残党は あと${remaining()}体。`);

  const lvBefore = battle.lvStart;
  battle = null;
  renderHud(); save();
  showMsgs(msgs.concat(checkForget(lvBefore)), afterBattleFlow);
}
function checkForget(before) {
  const out = []; const now = lvOf();
  for (const sp of SPELLS) {
    if (sp.minLv > 1 && before >= sp.minLv && now < sp.minLv && !G.forgot[sp.id]) {
      G.forgot[sp.id] = true;
      out.push(`——「${sp.name}」の使い方を、もう思い出せない。力が抜けていく。`);
    }
  }
  return out;
}
function afterBattleFlow() {
  // 戦闘のあと、少し息を整える（HPと魔力が少し戻る。削れた強さは戻らない）
  const s = stats();
  const restHp = Math.min(s.maxHp - G.hp, Math.round(s.maxHp * 0.30));
  if (restHp > 0) G.hp += restHp;
  G.mp = Math.min(MAXMP, G.mp + Math.round(MAXMP * REST_MP));
  renderHud(); save();
  // 迷路に戻る（勇者は倒した部屋の上にいる）。階段は全滅後に開く
  renderDungeon();
}
function defeat() {
  const wasFinale = battle.isFinale, lvBefore = battle.lvStart;
  const region = battle.region, roomIdx = battle.roomIdx;
  const hadHostage = !wasFinale && battle.hostage && !battle.hostage.dead;
  battle = null;
  const s = stats(); G.hp = s.maxHp;
  const msgs = ['勇者は力尽きた……', '…………', '目を覚ますと、魔物が傷の手当てをしてくれていた。',
    '魔物「戦争はもう終わったのに、あんたも物好きだねぇ」', 'HPが回復した。だが、削れた強さは戻らない。'];
  if (wasFinale) { renderHud(); save(); showMsgs(msgs, battleMenuRetryFinale); return; }
  // 残党は討伐隊が始末してしまった（人質ごと）
  if (hadHostage) G.lost++;
  G.cleared[region][roomIdx] = true;
  msgs.push('気がつけば、討伐隊がその残党を片づけていた——人質もろとも。');
  renderHud(); save();
  showMsgs(msgs.concat(checkForget(lvBefore)), afterBattleFlow);
}
function battleMenuRetryFinale() { startFinale(); }

function showFinaleGate() {
  renderHud();
  stage.innerHTML = `<div class="map-scene"><h2>🏡 故郷の村へ</h2>
    <div class="map-sub">残党はあと1体。世界に残された、最後の魔物。</div></div>`;
  setCmds([{ label: '村へ向かう', primary: true, wide: true, fn: startFinale }], true);
}

// ===== イベント =====
function runEvents(ids, done) {
  if (!ids || ids.length === 0) { done(); return; }
  const queue = ids.slice();
  const step = () => { if (queue.length === 0) { done(); return; } const id = queue.shift(); EVENTS[id](step); };
  step();
}
function depart(name) { const i = G.party.indexOf(name); if (i >= 0) G.party.splice(i, 1); }

const EVENTS = {
  // ===== 天空の魔王城 → 飛行艇で地上へ降りる =====
  airship_descent: (next) => showMsgs([
    '魔王城の残党を、すべて殲滅した。',
    '天空に浮かぶこの城も、もう用済みだ。',
    '勇者は飛行艇に乗り込み、雲を抜けて——地上へと降りていく。',
    '眼下に広がるのは、まだ見ぬ大地。この先に何が待つのか、空の上からは分からない。',
  ], next),

  // ===== RPGの逆：仲間が“抜けていく” =====
  leave_sage: (next) => showMsgs([
    '飛行艇のデッキ。賢者リーナが杖を置いた。',
    'リーナ「魔王は倒れた。わたしの魔法も、もう要らないでしょう」',
    'リーナ「塔に戻るわ。……あなたも、はやく人間に戻りなさい」',
    '<b>賢者リーナはパーティを去った。</b>',
  ], () => { depart('賢者リーナ'); next(); }),
  leave_warrior: (next) => showMsgs([
    '戦士ガロが剣を鞘に納め、二度と抜かないという顔をした。',
    'ガロ「俺は鍛冶屋の倅だ。これからは剣を打つ側に回るさ」',
    '<b>戦士ガロはパーティを去った。</b>　一人、また一人と、世界が平時に戻っていく。',
  ], () => { depart('戦士ガロ'); next(); }),
  leave_priest: (next) => showMsgs([
    '僧侶ミラが、傷ついた人々のいる村に残ると言った。',
    'ミラ「祈りが必要なのは、もう前線じゃない。ここよ」',
    '<b>僧侶ミラはパーティを去った。</b>',
  ], () => { depart('僧侶ミラ'); next(); }),
  last_companion: (next) => showMsgs([
    '気づけば、飛行艇に乗っているのは勇者ひとりだった。',
    '仲間が増えていく旅の、ちょうど逆。減っていって、最後に残るのは自分だけ。',
    'この先の最後の戦いに、もう誰もついてこない。',
  ], next),

  // ===== RPGの逆：歓迎されない村 =====
  village_unwelcome: (next) => showMsgs([
    '麓の村に降りる。だが、誰も「勇者様」とは呼ばなかった。',
    '村人「……戦争の人だ。もう魔物はいないんでしょう？　早く行ってくれ」',
    '宿屋の主人「悪いが、もう客は取ってないんだ。みんな、思い出したくないのさ」',
    '英雄を待ち望む村は、もうどこにもない。',
  ], next),

  // ===== RPGの逆：武器屋は“買い取り専門” =====
  merchant_buyer: (next) => {
    showChoice([
      '砦跡の露店。武具商が勇者の剣を一瞥した。',
      '武具商「いい剣だが……戦後は売れないねぇ。英雄の剣なんて、誰も欲しがらない」',
      '武具商「なんなら買い取るよ。二束三文だが、路銀の足しにはなる」',
    ], [
      { label: '英雄の剣を売る（+1,500G）', primary: true, fn: () => { G.gold += 1500; G.choices.soldSword = true;
        showMsgs(['英雄の剣を手放した。手が、少しだけ軽くなった。', '——強くなるために買う旅の、逆。'], next); } },
      { label: '手放さない', fn: () => showMsgs(['まだ、手放せなかった。'], next) },
    ]);
  },

  // ===== 選択：投降してきた魔物 =====
  surrender_monster: (next) => {
    showChoice([
      '道の途中、人質を取っていない魔物が、両手を上げて震えていた。',
      '魔物「お、おれは降参だ……もう戦いたくねぇ。見逃してくれ……」',
      'これは残党討伐の対象だ。斬れば、また一体減る。',
    ], [
      { label: '見逃す', primary: true, fn: () => { G.choices.spared = true;
        showMsgs(['勇者は剣を納めた。', '魔物「……恩に着る。あんた、変わった勇者だな」',
          'モンスターを全滅させる旅の、逆。共に生きる道もある。'], next); } },
      { label: '斬る', fn: () => { G.choices.executed = true;
        showMsgs(['勇者は剣を振るった。', '討伐隊「ご立派です。これでまた一体」', '勇者は、何も言えなかった。'], next); } },
    ]);
  },

  // ===== 選択：討伐隊長の誘惑 =====
  commander_offer: (next) => {
    showChoice([
      '沼地で、残党討伐隊の隊長が待っていた。',
      '隊長「勇者殿。あなたは消耗しすぎだ。人質を救うたびに、弱っていく」',
      '隊長「この沼の魔物は、我々が人質ごと焼く。あなたは指一本動かさず、強いまま先へ進める」',
      '隊長「英雄が弱るのは、世界の損失だ。……どうします？」',
    ], [
      { label: '断る（自分で救う）', primary: true, fn: () => showMsgs(['勇者「守るべきものを、間違えるな」', '隊長「……ご勝手に」'], next) },
      { label: '任せる（被弾せず進めるが、この沼の人質は全滅）', fn: () => {
        G.choices.acceptedOffer = true;
        // 亡者の沼の残り残党を“被弾なしで”自動処理：人質は全滅、勇者は削れない
        const ri = curRegion();
        let cnt = 0;
        G.cleared[ri].forEach((c, k) => { if (!c) { G.cleared[ri][k] = true; G.lost++; cnt++; } });
        renderHud(); save();
        showMsgs([`隊長「賢明だ」　討伐隊が沼の残党${cnt}体を、人質もろとも焼き払った。`,
          '勇者は一歩も動かず、強いまま——そして、何人もの悲鳴を背に進んだ。', '残った強さの分だけ、失ったものがある。'],
          next);
      } },
    ]);
  },

  // ===== RPGの逆：加護が去る =====
  blessing_fades: (next) => showMsgs([
    '祠の前で、いつものように祈った。だが——',
    '何も起きなかった。光も、声も、温もりも。',
    '「選ばれし者」への加護は、役目を終えて去ったらしい。',
    'もう、誰も守ってはくれない。',
  ], next),

  // ===== RPGの逆：英雄譚の風化 =====
  bard_song: (next) => showMsgs([
    '森の入口で、吟遊詩人が勇者の歌を口ずさんでいた。',
    '詩人「♪ 黄金の鎧の勇者は、千の軍勢を率いて——」',
    '……どれも、間違っている。鎧は黄金ではないし、軍勢などいなかった。',
    '伝説になるどころか、自分の物語は、もう正しく覚えられてさえいない。',
  ], next),

  // ===== 選択：村で休む =====
  rest_village: (next) => {
    showChoice([
      '森の手前に、小さな村。久しぶりに、休めそうな場所だ。',
      '一晩休めば、傷は癒える。だが——その間に討伐隊は先行する。',
    ], [
      { label: '休む（HP全回復・魔力少し回復／だが人質を1人見殺しに）', primary: true, fn: () => {
        G.hp = stats().maxHp; G.mp = Math.min(MAXMP, G.mp + 30); G.choices.rested = true;
        // 次の残党の人質を討伐隊が処理（pos は進めず、フラグで次戦の人質を初期死亡に…簡易に lost+1）
        G.lost++;
        renderHud(); save();
        showMsgs(['ひと晩、泥のように眠った。HPと魔力が戻った。',
          '夜明け、遠くで火の手が上がっていた。先行した討伐隊が、また一人——。', '休むことにも、代償がある。'], next);
      } },
      { label: '休まず進む', fn: () => showMsgs(['勇者は足を止めなかった。'], next) },
    ]);
  },
};

// ===== エンディング =====
function showEnding() {
  hud.style.display = 'none';
  const s = stats();
  const saved = G.saved, lost = G.lost;
  let lines = [];
  // 強さの帰結
  if (s.lv >= 70) lines.push('英雄の力は、ほとんど残っていた。だが、その手で救えた命は少ない。');
  else if (s.lv >= 30) lines.push(`勇者はLv${s.lv}まで衰えた。強さと引き換えに、いくつもの命を守った。`);
  else lines.push(`勇者はLv${s.lv}——もう、どこにでもいる若者だった。救うために、すべてを使い果たして。`);
  // 人質の帰結
  if (lost === 0 && saved > 0) lines.push(`守り抜いた市民：${saved}人。誰一人、犠牲にしなかった。`);
  else if (saved === 0) lines.push('救えた市民は、いなかった。勇者は強いまま、ひとりだった。');
  else lines.push(`守った市民：${saved}人。守れなかった市民：${lost}人。勇者は、その名前を生涯忘れない。`);
  // 選択の帰結
  if (G.choices.spared) lines.push('見逃したあの魔物は、どこかで静かに生きているだろうか。');
  if (G.choices.acceptedOffer) lines.push('沼で背を向けた悲鳴は、もう夢にしか出てこない。');
  if (G.choices.soldSword) lines.push('英雄の剣は、もう手元にない。畑を耕す鍬の方が、今は手に馴染む。');

  stage.innerHTML = `<div class="ending-scene">
    <div>${makeSprite('hero', 7)}</div>
    <div>世界から、魔物が1体もいなくなった。<br>勇者は飛行艇を降り、歩いて村の門をくぐる。<br><br>「ただいま」<br><br>${lines.join('<br>')}<br><br>戦いの日々は終わり、ここから彼の人生が始まる。</div>
    <div class="the-beginning">THE BEGINNING</div></div>`;
  clearSave();
  setCmds([{ label: 'タイトルへ', wide: true, fn: () => { G = null; showTitle(); } }], true);
}

// ===== 起動 =====
showTitle();
</script>
